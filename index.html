<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Education — 업무 리포트</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E8E4DC;
    --text: #1A1714;
    --muted: #8A8480;
    --accent: #2B4FFF;
    --accent-light: #EEF1FF;
    --done: #0E9F6E;
    --done-light: #ECFDF5;
    --warn: #D97706;
    --warn-light: #FFFBEB;
    --tag-bg: #F0EDE6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── NAV ── */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-family: 'DM Serif Display', serif; font-size: 18px; letter-spacing: -0.3px; }
  .nav-logo span { color: var(--accent); }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--muted); transition: all 0.15s; }
  .nav-tab.active { background: var(--accent); color: #fff; }
  .nav-tab:hover:not(.active) { background: var(--tag-bg); color: var(--text); }

  /* ── VIEWS ── */
  .view { display: none; max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem; }
  .view.active { display: block; }

  /* ── INPUT VIEW ── */
  .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .week-label { font-family: 'DM Serif Display', serif; font-size: 26px; letter-spacing: -0.5px; }
  .week-nav { display: flex; gap: 8px; align-items: center; }
  .week-nav button { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .week-nav button:hover { border-color: var(--accent); color: var(--accent); }
  .week-range { font-size: 13px; color: var(--muted); min-width: 160px; text-align: center; }

  .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; transition: box-shadow 0.15s; }
  .day-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
  .day-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; user-select: none; }
  .day-info { display: flex; align-items: center; gap: 12px; }
  .day-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .day-dot.has-work { background: var(--accent); }
  .day-dot.today { background: var(--done); }
  .day-name { font-weight: 500; font-size: 15px; }
  .day-date { font-size: 13px; color: var(--muted); }
  .day-count { font-size: 12px; color: var(--muted); padding: 3px 10px; background: var(--tag-bg); border-radius: 20px; }
  .day-count.has-count { background: var(--accent-light); color: var(--accent); }
  .day-toggle { font-size: 18px; color: var(--muted); transition: transform 0.2s; }
  .day-body { display: none; padding: 0 18px 16px; border-top: 1px solid var(--border); }
  .day-body.open { display: block; }

  .task-list { margin-top: 12px; }
  .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-cat { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .cat-reels { background: #EEF1FF; color: #2B4FFF; }
  .cat-edit { background: #FEF3C7; color: #92400E; }
  .cat-plan { background: #D1FAE5; color: #065F46; }
  .cat-idea { background: #FCE7F3; color: #831843; }
  .cat-admin { background: #F0EDE6; color: #57534E; }
  .cat-other { background: #F0EDE6; color: #57534E; }
  .task-text { font-size: 14px; flex: 1; line-height: 1.5; color: var(--text); }
  .task-time { font-size: 12px; color: var(--muted); white-space: nowrap; margin-top: 2px; }
  .task-del { color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px; opacity: 0; transition: opacity 0.15s; }
  .task-item:hover .task-del { opacity: 1; }

  .add-task-form { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
  .add-task-row { display: flex; gap: 8px; }
  select, input[type=text], input[type=number], textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--accent); background: var(--surface); }
  .input-cat { width: 130px; flex-shrink: 0; }
  .input-task { flex: 1; }
  .input-time { width: 70px; flex-shrink: 0; }
  .btn-add { padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
  .btn-add:hover { opacity: 0.85; }

  .ai-input-area { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
  .ai-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .ai-badge { background: var(--accent-light); color: var(--accent); font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 4px; }
  .ai-row { display: flex; gap: 8px; }
  .ai-text { flex: 1; resize: none; height: 38px; line-height: 1.4; }
  .btn-ai { padding: 8px 14px; background: var(--surface); color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .btn-ai:hover { background: var(--accent); color: #fff; }

  /* ── SUMMARY BAR ── */
  .summary-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 1.5rem; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .sum-item { text-align: center; }
  .sum-val { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
  .sum-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── GENERATE BTN ── */
  .gen-section { text-align: center; margin-top: 2rem; }
  .btn-gen { padding: 14px 36px; background: var(--text); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; letter-spacing: -0.2px; }
  .btn-gen:hover { background: var(--accent); transform: translateY(-1px); }

  /* ── REPORT VIEW ── */
  .report-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: gap; gap: 12px; }
  .report-title { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.5px; }
  .report-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .share-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .share-btn:hover { opacity: 0.85; }

  .report-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 28px; }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .report-day { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
  .report-day-header { padding: 14px 20px; background: var(--tag-bg); display: flex; align-items: center; justify-content: space-between; }
  .report-day-name { font-weight: 500; font-size: 15px; }
  .report-day-date { font-size: 13px; color: var(--muted); }
  .report-task-list { padding: 8px 20px 14px; }
  .report-task { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .report-task:last-child { border-bottom: none; }
  .report-no-task { padding: 12px 20px; font-size: 13px; color: var(--muted); }

  .share-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; align-items: center; justify-content: center; }
  .share-modal.open { display: flex; }
  .share-box { background: var(--surface); border-radius: 16px; padding: 28px; width: 440px; max-width: 90vw; }
  .share-box h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 6px; }
  .share-box p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .share-url { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px; font-family: monospace; color: var(--text); word-break: break-all; margin-bottom: 12px; }
  .share-actions { display: flex; gap: 8px; }
  .btn-copy { flex: 1; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn-copy:hover { opacity: 0.85; }
  .btn-close-modal { padding: 10px 16px; background: none; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; cursor: pointer; color: var(--muted); }
  .btn-close-modal:hover { background: var(--bg); }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.7; }

  @media (max-width: 600px) {
    .report-stats { grid-template-columns: repeat(2, 1fr); }
    .add-task-row { flex-wrap: wrap; }
    .input-cat { width: 100%; }
    .input-time { width: 80px; }
    nav { padding: 0 1rem; }
    .view { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">HD <span>Education</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('input')">업무 입력</button>
    <button class="nav-tab" onclick="switchView('report')">리포트 보기</button>
  </div>
</nav>

<!-- INPUT VIEW -->
<div class="view active" id="view-input">
  <div class="week-header">
    <div>
      <div class="week-label" id="week-label">이번 주 업무</div>
      <div style="font-size:13px; color:var(--muted); margin-top:4px;" id="week-range-top"></div>
    </div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)" title="이전 주">&#8592;</button>
      <button onclick="changeWeek(0)" title="이번 주" style="font-size:12px; width:auto; padding:0 10px; border-radius:8px;">이번 주</button>
      <button onclick="changeWeek(1)" title="다음 주">&#8594;</button>
    </div>
  </div>

  <div class="summary-bar">
    <div class="sum-item"><div class="sum-val" id="sum-tasks">0</div><div class="sum-lbl">완료 업무</div></div>
    <div class="sum-item"><div class="sum-val" id="sum-hours">0h</div><div class="sum-lbl">총 작업 시간</div></div>
    <div class="sum-item"><div class="sum-val" id="sum-days">0</div><div class="sum-lbl">활동일</div></div>
    <div style="flex:1; text-align:right;">
      <button class="btn-add" onclick="clearWeek()" style="background:none; color:var(--muted); border:1px solid var(--border);">주간 초기화</button>
    </div>
  </div>

  <div id="days-container"></div>

  <div class="gen-section">
    <button class="btn-gen" onclick="generateReport()">리포트 생성 및 공유 →</button>
    <div style="font-size:12px; color:var(--muted); margin-top:10px;">업무 내용이 정리된 공유 가능한 웹 리포트를 생성합니다</div>
  </div>
</div>

<!-- REPORT VIEW -->
<div class="view" id="view-report">
  <div class="report-topbar">
    <div>
      <div class="report-title" id="report-title">주간 업무 리포트</div>
      <div class="report-meta" id="report-meta"></div>
    </div>
    <button class="share-btn" onclick="openShare()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      공유하기
    </button>
  </div>

  <div class="report-stats">
    <div class="stat-card"><div class="stat-num" id="r-tasks">0</div><div class="stat-lbl">완료 업무 수</div></div>
    <div class="stat-card"><div class="stat-num" id="r-hours">0h</div><div class="stat-lbl">총 작업 시간</div></div>
    <div class="stat-card"><div class="stat-num" id="r-days">0</div><div class="stat-lbl">활동 일수</div></div>
  </div>

  <div id="report-days"></div>

  <div style="margin-top:2rem; text-align:center;">
    <button onclick="switchView('input')" style="padding:10px 24px; background:none; border:1px solid var(--border); border-radius:10px; font-size:14px; cursor:pointer; color:var(--muted);">← 입력으로 돌아가기</button>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="share-modal" id="share-modal">
  <div class="share-box">
    <h3>리포트 공유</h3>
    <p>아래 링크를 복사해서 회사에 전달하세요.<br>링크를 열면 이번 주 업무 리포트를 바로 확인할 수 있어요.</p>
    <div class="share-url" id="share-url-text"></div>
    <div class="share-actions">
      <button class="btn-copy" onclick="copyLink()">링크 복사</button>
      <button class="btn-close-modal" onclick="closeShare()">닫기</button>
    </div>
  </div>
</div>

<script>
const DAYS_KO = ['월요일','화요일','수요일','목요일','금요일','토요일','일요일'];
const DAYS_SHORT = ['월','화','수','목','금','토','일'];
const CATS = [
  { val: 'reels',  label: '릴스 제작',   cls: 'cat-reels'  },
  { val: 'edit',   label: '영상 편집',   cls: 'cat-edit'   },
  { val: 'plan',   label: '콘텐츠 기획', cls: 'cat-plan'   },
  { val: 'idea',   label: '아이디어',    cls: 'cat-idea'   },
  { val: 'admin',  label: '행정/보고',   cls: 'cat-admin'  },
  { val: 'other',  label: '기타',        cls: 'cat-other'  },
];

let weekOffset = 0;
let data = {}; // { "2025-01-06": [{cat, text, time}] }

function getWeekDates(offset) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function dateKey(d) {
  return d.toISOString().slice(0, 10);
}

function formatDate(d) {
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

function isToday(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

function catInfo(val) {
  return CATS.find(c => c.val === val) || CATS[5];
}

function saveData() {
  localStorage.setItem('hd_report_data', JSON.stringify(data));
}

function loadData() {
  try { data = JSON.parse(localStorage.getItem('hd_report_data') || '{}'); } catch(e) { data = {}; }
}

function changeWeek(dir) {
  if (dir === 0) weekOffset = 0;
  else weekOffset += dir;
  renderInputView();
}

function updateSummary(dates) {
  let total = 0, hours = 0, days = 0;
  dates.forEach(d => {
    const k = dateKey(d);
    const tasks = data[k] || [];
    if (tasks.length) { days++; total += tasks.length; }
    tasks.forEach(t => hours += (parseFloat(t.time) || 0));
  });
  document.getElementById('sum-tasks').textContent = total;
  document.getElementById('sum-hours').textContent = hours % 1 === 0 ? hours + 'h' : hours.toFixed(1) + 'h';
  document.getElementById('sum-days').textContent = days;
}

function renderInputView() {
  const dates = getWeekDates(weekOffset);
  const start = dates[0], end = dates[6];
  const label = weekOffset === 0 ? '이번 주 업무' : weekOffset < 0 ? `${Math.abs(weekOffset)}주 전 업무` : `${weekOffset}주 후 업무`;
  document.getElementById('week-label').textContent = label;
  document.getElementById('week-range-top').textContent = `${formatDate(start)} — ${formatDate(end)}`;
  updateSummary(dates);

  const container = document.getElementById('days-container');
  container.innerHTML = '';
  dates.forEach((d, i) => {
    const k = dateKey(d);
    const tasks = data[k] || [];
    const todayFlag = isToday(d);
    const card = document.createElement('div');
    card.className = 'day-card';

    const catOptions = CATS.map(c => `<option value="${c.val}">${c.label}</option>`).join('');

    card.innerHTML = `
      <div class="day-header" onclick="toggleDay('body-${k}', this)">
        <div class="day-info">
          <div class="day-dot ${tasks.length ? 'has-work' : ''} ${todayFlag ? 'today' : ''}" id="dot-${k}"></div>
          <div class="day-name">${DAYS_KO[i]}${todayFlag ? ' <span style="font-size:11px;color:var(--done);font-weight:500;">오늘</span>' : ''}</div>
          <div class="day-date" style="color:var(--muted);font-size:13px;">${formatDate(d)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="day-count ${tasks.length ? 'has-count' : ''}" id="count-${k}">${tasks.length ? tasks.length + '개' : '없음'}</div>
          <div class="day-toggle">›</div>
        </div>
      </div>
      <div class="day-body ${todayFlag ? 'open' : ''}" id="body-${k}">
        <div class="task-list" id="list-${k}"></div>
        <div class="add-task-form">
          <div class="add-task-row">
            <select class="input-cat" id="cat-${k}">${catOptions}</select>
            <input type="text" class="input-task" id="task-${k}" placeholder="업무 내용 입력..." onkeydown="if(event.key==='Enter')addTask('${k}')">
            <input type="number" class="input-time" id="time-${k}" placeholder="시간" min="0.5" max="24" step="0.5" value="1">
            <button class="btn-add" onclick="addTask('${k}')">추가</button>
          </div>
          <div class="ai-input-area">
            <div class="ai-label"><span class="ai-badge">AI 파싱</span> 말로 입력하기 — "릴스 기획 2개 완료, 영상 편집 1시간" 형식으로 쓰면 자동 분류</div>
            <div class="ai-row">
              <textarea class="ai-text" id="ai-${k}" placeholder="오늘 한 일을 자유롭게 적어보세요..."></textarea>
              <button class="btn-ai" onclick="parseAI('${k}')">분석 →</button>
            </div>
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
    renderTaskList(k);
  });
}

function toggleDay(bodyId, header) {
  const body = document.getElementById(bodyId);
  const toggle = header.querySelector('.day-toggle');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  toggle.style.transform = isOpen ? '' : 'rotate(90deg)';
}

function renderTaskList(k) {
  const list = document.getElementById('list-' + k);
  if (!list) return;
  const tasks = data[k] || [];
  list.innerHTML = tasks.map((t, i) => {
    const ci = catInfo(t.cat);
    return `<div class="task-item">
      <span class="task-cat ${ci.cls}">${ci.label}</span>
      <div style="flex:1">
        <div class="task-text">${t.text}</div>
        <div class="task-time">${t.time}시간</div>
      </div>
      <span class="task-del" onclick="deleteTask('${k}',${i})" title="삭제">×</span>
    </div>`;
  }).join('') || '<div style="font-size:13px;color:var(--muted);padding:8px 0;">아직 입력된 업무가 없어요</div>';

  const dot = document.getElementById('dot-' + k);
  const count = document.getElementById('count-' + k);
  if (dot) { dot.className = 'day-dot' + (tasks.length ? ' has-work' : ''); }
  if (count) { count.className = 'day-count' + (tasks.length ? ' has-count' : ''); count.textContent = tasks.length ? tasks.length + '개' : '없음'; }
  updateSummary(getWeekDates(weekOffset));
}

function addTask(k) {
  const cat = document.getElementById('cat-' + k).value;
  const text = document.getElementById('task-' + k).value.trim();
  const time = parseFloat(document.getElementById('time-' + k).value) || 1;
  if (!text) return;
  if (!data[k]) data[k] = [];
  data[k].push({ cat, text, time });
  saveData();
  document.getElementById('task-' + k).value = '';
  renderTaskList(k);
}

function deleteTask(k, i) {
  data[k].splice(i, 1);
  saveData();
  renderTaskList(k);
}

function clearWeek() {
  if (!confirm('이번 주 업무를 모두 초기화할까요?')) return;
  getWeekDates(weekOffset).forEach(d => { delete data[dateKey(d)]; });
  saveData();
  renderInputView();
}

function parseAI(k) {
  const raw = document.getElementById('ai-' + k).value.trim();
  if (!raw) return;

  // 간단한 키워드 기반 파싱
  const patterns = [
    { words: ['릴스','reels','숏폼'], cat: 'reels' },
    { words: ['편집','edit','컷','컷편집'], cat: 'edit' },
    { words: ['기획','계획','plan','캘린더','스케줄'], cat: 'plan' },
    { words: ['아이디어','idea','제안','브레인'], cat: 'idea' },
    { words: ['보고','미팅','회의','행정','문서','보고서'], cat: 'admin' },
  ];

  // 시간 파싱
  const timeMatch = raw.match(/(\d+(\.\d+)?)\s*(시간|h|hr)/i);
  const time = timeMatch ? parseFloat(timeMatch[1]) : 1;

  // 카테고리 파싱
  let bestCat = 'other';
  for (const p of patterns) {
    if (p.words.some(w => raw.includes(w))) { bestCat = p.cat; break; }
  }

  // 텍스트 정리
  let text = raw.replace(/\d+(\.\d+)?\s*(시간|h|hr)/ig, '').replace(/,/g, ' ').trim();
  if (text.length > 80) text = text.slice(0, 80) + '...';

  if (!data[k]) data[k] = [];
  data[k].push({ cat: bestCat, text, time });
  saveData();
  document.getElementById('ai-' + k).value = '';
  renderTaskList(k);
}

function generateReport() {
  switchView('report');
  renderReport();
}

function renderReport() {
  const dates = getWeekDates(weekOffset);
  const start = dates[0], end = dates[6];
  let totalTasks = 0, totalHours = 0, activeDays = 0;

  document.getElementById('report-title').textContent = '주간 업무 리포트';
  document.getElementById('report-meta').textContent =
    `HD Education · ${start.getFullYear()}년 ${formatDate(start)} — ${formatDate(end)} · 담당: 마케팅`;

  const container = document.getElementById('report-days');
  container.innerHTML = '';

  dates.forEach((d, i) => {
    const k = dateKey(d);
    const tasks = data[k] || [];
    if (!tasks.length) return;
    activeDays++;
    totalTasks += tasks.length;
    tasks.forEach(t => totalHours += parseFloat(t.time) || 0);

    const block = document.createElement('div');
    block.className = 'report-day';
    const taskRows = tasks.map(t => {
      const ci = catInfo(t.cat);
      return `<div class="report-task">
        <span class="task-cat ${ci.cls}">${ci.label}</span>
        <div style="flex:1"><div class="task-text">${t.text}</div></div>
        <div class="task-time">${t.time}시간</div>
      </div>`;
    }).join('');
    block.innerHTML = `
      <div class="report-day-header">
        <div class="report-day-name">${DAYS_KO[i]}</div>
        <div class="report-day-date">${formatDate(d)}</div>
      </div>
      <div class="report-task-list">${taskRows}</div>
    `;
    container.appendChild(block);
  });

  if (!activeDays) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>아직 입력된 업무가 없어요.<br>업무 입력 탭에서 이번 주 업무를 추가해주세요.</p></div>`;
  }

  document.getElementById('r-tasks').textContent = totalTasks;
  document.getElementById('r-hours').textContent = totalHours % 1 === 0 ? totalHours + 'h' : totalHours.toFixed(1) + 'h';
  document.getElementById('r-days').textContent = activeDays;
}

function openShare() {
  const dates = getWeekDates(weekOffset);
  const dataStr = encodeURIComponent(JSON.stringify({
    week: weekOffset,
    data: Object.fromEntries(dates.map(d => [dateKey(d), data[dateKey(d)] || []]))
  }));
  const url = window.location.href.split('?')[0] + '?report=' + dataStr;
  document.getElementById('share-url-text').textContent = url.length > 120 ? url.slice(0,120)+'…' : url;
  document.getElementById('share-modal').classList.add('open');
  window._shareUrl = url;
}

function closeShare() {
  document.getElementById('share-modal').classList.remove('open');
}

function copyLink() {
  navigator.clipboard.writeText(window._shareUrl || '').then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '복사됨 ✓';
    setTimeout(() => btn.textContent = '링크 복사', 2000);
  });
}

function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.nav-tab')[v === 'input' ? 0 : 1].classList.add('active');
  if (v === 'report') renderReport();
}

// URL 파라미터로 공유된 리포트 불러오기
function loadFromURL() {
  const params = new URLSearchParams(window.location.search);
  const report = params.get('report');
  if (!report) return;
  try {
    const parsed = JSON.parse(decodeURIComponent(report));
    weekOffset = parsed.week || 0;
    Object.assign(data, parsed.data || {});
    switchView('report');
  } catch(e) {}
}

// INIT
loadData();
loadFromURL();
renderInputView();
</script>
